version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mosafer_db_staging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mosafer}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mosafer_network_staging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mosafer_redis_staging
    volumes:
      - redis_data_staging:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mosafer_network_staging
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.staging
    container_name: mosafer_api_staging
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mosafer}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mosafer}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ENVIRONMENT: staging
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
      API_HOST: 0.0.0.0
      API_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mosafer_network_staging
    restart: unless-stopped

volumes:
  postgres_data_staging:
  redis_data_staging:

networks:
  mosafer_network_staging:
    driver: bridge
