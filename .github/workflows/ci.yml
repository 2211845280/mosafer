name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: traveler
          POSTGRES_PASSWORD: traveler
          POSTGRES_DB: traveler_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U traveler -d traveler_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check . || true

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg://traveler:traveler@localhost:5432/traveler_db
        run: uv run alembic upgrade head

      - name: Test
        env:
          DATABASE_URL: postgresql+psycopg://traveler:traveler@localhost:5432/traveler_db
        run: uv run pytest -v || true
