services:
  db:
    image: postgres:15-alpine
    container_name: mosafer_db_dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mosafer}
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mosafer_network

  redis:
    image: redis:7-alpine
    container_name: mosafer_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mosafer_network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: mosafer_api_dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mosafer}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mosafer}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ENVIRONMENT: dev
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: "true"
      REDIS_URL: redis://redis:6379/0
      API_HOST: 0.0.0.0
      API_PORT: 8001
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      # Anonymous volume: protects the container's Linux .venv from being
      # overwritten by the host's Windows .venv via the bind mount above.
      # Docker will preserve the container-built /app/.venv at this path.
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mosafer_network
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

    # Compose Watch (>= 2.22.0): syncs host files into the container on save,
    # enabling hot-reload without a full rebuild. The .venv/ ignore rule is
    # critical — it prevents the host's OS-specific virtual environment from
    # bleeding into the container's isolated Linux environment.
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - .git/
            - "*.pyc"
        # Rebuild the container when dependency files change, since a
        # simple file sync cannot update installed packages.
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: uv.lock

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: mosafer_worker_dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mosafer}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mosafer}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ENVIRONMENT: dev
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mosafer_network
    command: ["uv", "run", "arq", "app.workers.settings.WorkerSettings"]
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - .git/
            - "*.pyc"
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: uv.lock

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mosafer_pgadmin_dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@mosafer.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - mosafer_network
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:

networks:
  mosafer_network:
    driver: bridge
