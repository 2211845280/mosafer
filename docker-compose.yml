services:
  db:
    image: postgres:16-alpine
    container_name: traveler-db
    environment:
      POSTGRES_USER: traveler
      POSTGRES_PASSWORD: traveler
      POSTGRES_DB: traveler_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traveler -d traveler_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: traveler-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://traveler:traveler@db:5432/traveler_db
    ports:
      - "8000:8000"

volumes:
  postgres_data:
